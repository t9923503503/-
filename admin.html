<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d1a">
<meta http-equiv="Content-Security-Policy"
  content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://sv-ugra.ru; img-src 'self' data:;">
<meta name="description" content="Админ-панель — Лютые пляжники">
<title>Админ-панель — Лютые пляжники</title>
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── Base ────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #0d0d1a;
  --surface: #161628;
  --surface2:#1e1e38;
  --border:  #2a2a4a;
  --accent:  #7c6af7;
  --accent2: #a78bfa;
  --gold:    #ffd700;
  --text:    #e8e8f0;
  --muted:   #8888aa;
  --danger:  #f87171;
  --success: #4ade80;
  --warn:    #fb923c;
  --radius:  10px;
}
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
}

/* ── Login page ──────────────────────────────────────────── */
#login-page {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.brand-main {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  color: var(--gold);
  letter-spacing: 2px;
  text-align: center;
}
.brand-sub {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem;
  color: var(--muted);
  letter-spacing: 3px;
  text-align: center;
  margin-bottom: 32px;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 24px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 4px 24px rgba(0,0,0,.5);
}
.login-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 1px;
  margin-bottom: 20px;
  text-align: center;
}
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 5px;
}
.field input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 0.95rem;
  padding: 10px 13px;
  outline: none;
  transition: border-color .2s;
}
.field input:focus { border-color: var(--accent); }

/* ── Admin layout ────────────────────────────────────────── */
#admin-page { display: none; min-height: 100vh; }

.admin-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.admin-brand {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  color: var(--gold);
  letter-spacing: 1.5px;
}
.admin-brand span {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 2px;
  margin-left: 8px;
}

.admin-content { padding: 20px 16px 60px; max-width: 900px; margin: 0 auto; }

/* ── Tabs ────────────────────────────────────────────────── */
.tab-bar {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 20px;
  overflow-x: auto;
}
.tab-btn {
  flex: 1;
  min-width: 70px;
  background: transparent;
  border: none;
  border-radius: 7px;
  color: var(--muted);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  padding: 8px 6px;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
  position: relative;
}
.tab-btn:hover { background: var(--surface2); color: var(--text); }
.tab-btn.active {
  background: var(--accent);
  color: #fff;
}
.tab-badge {
  display: inline-block;
  background: var(--warn);
  color: #fff;
  font-size: 0.65rem;
  font-weight: 700;
  border-radius: 10px;
  padding: 1px 5px;
  margin-left: 4px;
  vertical-align: middle;
}

/* ── Section ─────────────────────────────────────────────── */
.section { display: none; }
.section.active { display: block; }
.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 1px;
  margin-bottom: 16px;
  color: var(--text);
}

/* ── Cards / Table ───────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
}
.card-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.card-row:last-child { border-bottom: none; }
.card-name {
  font-weight: 600;
  font-size: 0.95rem;
  flex: 1;
  min-width: 120px;
}
.card-meta {
  font-size: 0.78rem;
  color: var(--muted);
}
.badge {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  border-radius: 6px;
  padding: 2px 8px;
  text-transform: uppercase;
}
.badge-m      { background: rgba(96,165,250,.15); color: #60a5fa; }
.badge-w      { background: rgba(244,114,182,.15); color: #f472b6; }
.badge-pending  { background: rgba(251,146,60,.12); color: var(--warn); }
.badge-approved { background: rgba(74,222,128,.1);  color: var(--success); }
.badge-rejected { background: rgba(248,113,113,.1); color: var(--danger); }

/* ── Buttons ──────────────────────────────────────────────── */
.btn {
  border: none; border-radius: 7px; cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.82rem; font-weight: 700; letter-spacing: 0.5px;
  padding: 7px 14px; transition: opacity .2s, transform .1s;
  white-space: nowrap;
}
.btn:hover   { opacity: .85; }
.btn:active  { transform: scale(.97); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-success { background: var(--success);  color: #052e16; }
.btn-danger  { background: var(--danger);   color: #fff; }
.btn-accent  { background: var(--accent);   color: #fff; }
.btn-muted   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-logout  { background: transparent; border: 1px solid var(--border); color: var(--muted);
               border-radius: 7px; padding: 6px 14px; cursor: pointer; font-size: 0.82rem; }
.btn-logout:hover { border-color: var(--danger); color: var(--danger); }

/* ── Generic UI ──────────────────────────────────────────── */
.btn-submit {
  width: 100%; background: var(--accent); border: none; border-radius: 8px;
  color: #fff; font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem; letter-spacing: 1px; padding: 13px;
  cursor: pointer; margin-top: 6px; transition: background .2s;
}
.btn-submit:hover { background: var(--accent2); }
.btn-submit:disabled { background: var(--border); cursor: not-allowed; }
.msg { border-radius: 8px; padding: 10px 14px; font-size: 0.88rem;
       margin-bottom: 14px; display: none; }
.msg.error   { background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.4);
               color: var(--danger); display: block; }
.msg.success { background: rgba(74,222,128,.1); border: 1px solid rgba(74,222,128,.35);
               color: var(--success); display: block; }
.empty-state { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 0.9rem; }
.spinner { display: inline-block; width: 14px; height: 14px;
           border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
           border-radius: 50%; animation: spin .7s linear infinite;
           vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Search / Filter ─────────────────────────────────────── */
.filter-row {
  display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;
}
.filter-input {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: 'Barlow', sans-serif;
  font-size: 0.9rem; padding: 8px 12px; outline: none;
  flex: 1; min-width: 150px;
}
.filter-input:focus { border-color: var(--accent); }
.filter-select {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 0.85rem;
  padding: 8px 10px; outline: none; cursor: pointer;
}

/* ── Form in admin ───────────────────────────────────────── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.form-grid .field { margin-bottom: 0; }
@media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }

/* ── Tournament card ─────────────────────────────────────── */
.trn-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  flex-wrap: wrap;
}
.trn-info { flex: 1; min-width: 150px; }
.trn-name { font-weight: 600; font-size: 1rem; margin-bottom: 4px; }
.trn-meta { font-size: 0.78rem; color: var(--muted); }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════
     LOGIN PAGE
══════════════════════════════════════════════════════════ -->
<div id="login-page">
  <div class="brand-main">ЛЮТЫЕ ПЛЯЖНИКИ !!</div>
  <div class="brand-sub">Admin Panel</div>

  <div class="login-card">
    <div class="login-title">🔐 Вход администратора</div>

    <div id="login-error" class="msg error"></div>

    <div class="field">
      <label for="login-email">Email</label>
      <input id="login-email" type="email" placeholder="admin@example.com"
             autocomplete="username">
    </div>
    <div class="field">
      <label for="login-pwd">Пароль</label>
      <input id="login-pwd" type="password" placeholder="••••••••"
             autocomplete="current-password">
    </div>
    <button class="btn-submit" id="btn-login">Войти</button>
  </div>
</div>

<!-- ══════════════════════════════════════════════════════════
     ADMIN PAGE
══════════════════════════════════════════════════════════ -->
<div id="admin-page">

  <!-- Header -->
  <div class="admin-header">
    <div>
      <span class="admin-brand">ADMIN</span>
      <span class="admin-brand"><span>Лютые пляжники</span></span>
    </div>
    <button class="btn-logout" id="btn-logout">Выйти</button>
  </div>

  <div class="admin-content">

    <!-- Tab bar -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="requests">
        Заявки <span class="tab-badge" id="requests-badge" style="display:none">0</span>
      </button>
      <button class="tab-btn" data-tab="players">Игроки</button>
      <button class="tab-btn" data-tab="tournaments">Турниры</button>
      <button class="tab-btn" data-tab="history">История</button>
    </div>

    <!-- ── ЗАЯВКИ ───────────────────────────────────────────── -->
    <div class="section active" id="sec-requests">
      <div class="section-title">Заявки на регистрацию</div>
      <div class="filter-row">
        <select class="filter-select" id="req-filter">
          <option value="pending">Ожидают</option>
          <option value="approved">Одобренные</option>
          <option value="rejected">Отклонённые</option>
        </select>
        <button class="btn btn-muted" id="btn-refresh-req">↻ Обновить</button>
      </div>
      <div id="requests-list"><div class="empty-state">Загрузка...</div></div>
    </div>

    <!-- ── ИГРОКИ ───────────────────────────────────────────── -->
    <div class="section" id="sec-players">
      <div class="section-title">База игроков</div>
      <div class="filter-row">
        <input class="filter-input" id="players-search" type="search" placeholder="Поиск по имени или email...">
        <select class="filter-select" id="players-gender">
          <option value="">Все</option>
          <option value="M">♂ Мужской</option>
          <option value="W">♀ Женский</option>
        </select>
        <select class="filter-select" id="players-status">
          <option value="active">Активные</option>
          <option value="pending">Ожидают</option>
          <option value="banned">Заблокированные</option>
        </select>
      </div>
      <div id="players-list"><div class="empty-state">Загрузка...</div></div>
    </div>

    <!-- ── ТУРНИРЫ ──────────────────────────────────────────── -->
    <div class="section" id="sec-tournaments">
      <div class="section-title">Управление турнирами</div>

      <!-- Create tournament form -->
      <div class="card" style="padding:16px; margin-bottom:18px;">
        <div style="font-weight:600; margin-bottom:14px; font-size:0.9rem;">➕ Новый турнир</div>
        <div class="form-grid">
          <div class="field">
            <label>Название</label>
            <input class="filter-input" id="trn-name" type="text" placeholder="Летний КоТС #1">
          </div>
          <div class="field">
            <label>Дата</label>
            <input class="filter-input" id="trn-date" type="date">
          </div>
          <div class="field">
            <label>Формат</label>
            <select class="filter-select" id="trn-format" style="width:100%">
              <option value="kotc">King of the Court</option>
              <option value="ipt_mixed">IPT Mixed</option>
              <option value="classic">Классика</option>
              <option value="swiss">Швейцарская</option>
              <option value="double_elim">Double Elimination</option>
            </select>
          </div>
          <div class="field">
            <label>Макс. игроков</label>
            <input class="filter-input" id="trn-max" type="number" placeholder="32" min="4" max="128">
          </div>
        </div>
        <button class="btn btn-accent" id="btn-create-trn" style="margin-top:12px;">
          Создать турнир
        </button>
        <div id="trn-msg" class="msg" style="margin-top:10px; margin-bottom:0;"></div>
      </div>

      <div id="tournaments-list"><div class="empty-state">Загрузка...</div></div>
    </div>

    <!-- ── ИСТОРИЯ ──────────────────────────────────────────── -->
    <div class="section" id="sec-history">
      <div class="section-title">История рейтинга</div>
      <div class="filter-row">
        <input class="filter-input" id="history-search" type="search" placeholder="Поиск по игроку...">
        <button class="btn btn-muted" id="btn-refresh-history">↻ Обновить</button>
      </div>
      <div id="history-list"><div class="empty-state">Загрузка...</div></div>
    </div>

  </div><!-- /admin-content -->
</div><!-- /admin-page -->

<script>
(function () {
  'use strict';

  const API      = 'https://sv-ugra.ru/api/rest/v1';
  const TOKEN_KEY = 'admin_jwt';

  // ── Auth helpers ──────────────────────────────────────────
  function getToken()          { return sessionStorage.getItem(TOKEN_KEY); }
  function setToken(t)         { sessionStorage.setItem(TOKEN_KEY, t); }
  function clearToken()        { sessionStorage.removeItem(TOKEN_KEY); }
  function authHeaders() {
    return {
      'Content-Type':  'application/json',
      'Accept':        'application/json',
      'Authorization': 'Bearer ' + getToken()
    };
  }

  // ── API ───────────────────────────────────────────────────
  async function apiFetch(path, opts = {}) {
    const res = await fetch(API + path, {
      headers: authHeaders(),
      ...opts
    });
    if (res.status === 401) { logout(); return null; }
    const data = res.headers.get('content-type')?.includes('json')
      ? await res.json() : await res.text();
    if (!res.ok) throw new Error(data?.message || data?.hint || JSON.stringify(data) || res.statusText);
    return data;
  }

  // ── Login ─────────────────────────────────────────────────
  const loginPage = document.getElementById('login-page');
  const adminPage = document.getElementById('admin-page');

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pwd   = document.getElementById('login-pwd').value;
    const errEl = document.getElementById('login-error');
    const btn   = document.getElementById('btn-login');

    errEl.className = 'msg';
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Вход...';

    try {
      const res = await fetch(`${API}/rpc/admin_login`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body:    JSON.stringify({ p_email: email, p_password: pwd })
      });
      const data = await res.json().catch(() => ({}));

      if (res.ok && data.token) {
        setToken(data.token);
        showAdminPanel();
      } else {
        errEl.textContent = data.message || 'Неверный email или пароль';
        errEl.className = 'msg error';
        btn.disabled = false;
        btn.textContent = 'Войти';
      }
    } catch (e) {
      errEl.textContent = 'Ошибка соединения';
      errEl.className = 'msg error';
      btn.disabled = false;
      btn.textContent = 'Войти';
    }
  }

  function logout() {
    clearToken();
    adminPage.style.display = 'none';
    loginPage.style.display = 'flex';
    document.getElementById('login-pwd').value = '';
    document.getElementById('login-email').value = '';
    document.getElementById('btn-login').textContent = 'Войти';
    document.getElementById('btn-login').disabled = false;
  }

  function showAdminPanel() {
    loginPage.style.display = 'none';
    adminPage.style.display = 'block';
    loadRequests();
    loadPlayers();
    loadTournaments();
  }

  document.getElementById('btn-login').addEventListener('click', doLogin);
  document.getElementById('login-pwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('btn-logout').addEventListener('click', logout);

  // ── Tab switching ─────────────────────────────────────────
  const tabMap = {
    requests:    'sec-requests',
    players:     'sec-players',
    tournaments: 'sec-tournaments',
    history:     'sec-history'
  };
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(tabMap[btn.dataset.tab]).classList.add('active');
      if (btn.dataset.tab === 'history') loadHistory();
    });
  });

  // ── esc helper ────────────────────────────────────────────
  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ════════════════════════════════════════════════════════════
  //  REQUESTS TAB
  // ════════════════════════════════════════════════════════════
  async function loadRequests() {
    const status = document.getElementById('req-filter').value;
    const el = document.getElementById('requests-list');
    el.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';

    try {
      const data = await apiFetch(`/player_requests?status=eq.${status}&order=created_at.asc`);
      if (!data) return;

      // Update badge
      const pendingCount = status === 'pending' ? data.length : 0;
      const badge = document.getElementById('requests-badge');
      if (pendingCount > 0) {
        badge.textContent = pendingCount;
        badge.style.display = '';
      } else {
        badge.style.display = 'none';
      }

      if (!data.length) {
        el.innerHTML = '<div class="empty-state">Нет заявок со статусом «' + esc(status) + '»</div>';
        return;
      }

      el.innerHTML = data.map(req => `
        <div class="card-row" id="req-row-${esc(req.id)}">
          <div style="flex:1; min-width:130px;">
            <div class="card-name">${esc(req.name)}</div>
            <div class="card-meta">${esc(req.email || '—')}</div>
          </div>
          <span class="badge badge-${req.gender === 'M' ? 'm' : 'w'}">${req.gender === 'M' ? '♂ М' : '♀ Ж'}</span>
          <span class="badge badge-${esc(req.status)}">${esc(req.status)}</span>
          <div class="card-meta">${req.created_at ? new Date(req.created_at).toLocaleDateString('ru') : '—'}</div>
          ${status === 'pending' ? `
            <button class="btn btn-success" onclick="approveReq('${esc(req.id)}')">✓ Одобрить</button>
            <button class="btn btn-danger"  onclick="rejectReq('${esc(req.id)}')">✕ Отклонить</button>
          ` : ''}
        </div>
      `).join('');
    } catch (e) {
      el.innerHTML = '<div class="empty-state" style="color:var(--danger)">Ошибка: ' + esc(e.message) + '</div>';
    }
  }

  window.approveReq = async function(id) {
    const row = document.getElementById('req-row-' + id);
    if (row) row.style.opacity = '0.5';
    try {
      await apiFetch('/rpc/approve_player_request', {
        method: 'POST',
        body: JSON.stringify({ p_request_id: id })
      });
      loadRequests();
    } catch (e) {
      alert('Ошибка: ' + e.message);
      if (row) row.style.opacity = '1';
    }
  };

  window.rejectReq = async function(id) {
    if (!confirm('Отклонить заявку?')) return;
    const row = document.getElementById('req-row-' + id);
    if (row) row.style.opacity = '0.5';
    try {
      await apiFetch('/rpc/reject_player_request', {
        method: 'POST',
        body: JSON.stringify({ p_request_id: id, p_reason: 'Отклонено администратором' })
      });
      loadRequests();
    } catch (e) {
      alert('Ошибка: ' + e.message);
      if (row) row.style.opacity = '1';
    }
  };

  document.getElementById('req-filter').addEventListener('change', loadRequests);
  document.getElementById('btn-refresh-req').addEventListener('click', loadRequests);

  // ════════════════════════════════════════════════════════════
  //  PLAYERS TAB
  // ════════════════════════════════════════════════════════════
  let allPlayers = [];

  async function loadPlayers() {
    const el = document.getElementById('players-list');
    el.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
    try {
      const status = document.getElementById('players-status').value;
      allPlayers = await apiFetch(`/players?status=eq.${status}&order=name.asc&select=id,name,email,gender,status,total_pts,tournaments`) || [];
      renderPlayers();
    } catch (e) {
      el.innerHTML = '<div class="empty-state" style="color:var(--danger)">Ошибка: ' + esc(e.message) + '</div>';
    }
  }

  function renderPlayers() {
    const el     = document.getElementById('players-list');
    const search = document.getElementById('players-search').value.toLowerCase();
    const gender = document.getElementById('players-gender').value;

    const list = allPlayers.filter(p => {
      const nameMatch  = !search || (p.name || '').toLowerCase().includes(search) || (p.email || '').toLowerCase().includes(search);
      const genderMatch = !gender || p.gender === gender;
      return nameMatch && genderMatch;
    });

    if (!list.length) {
      el.innerHTML = '<div class="empty-state">Игроки не найдены</div>';
      return;
    }

    el.innerHTML = '<div class="card">' + list.map(p => `
      <div class="card-row">
        <div style="flex:1; min-width:130px;">
          <div class="card-name">${esc(p.name)}</div>
          <div class="card-meta">${esc(p.email || '—')}</div>
        </div>
        <span class="badge badge-${p.gender === 'M' ? 'm' : 'w'}">${p.gender === 'M' ? '♂' : '♀'}</span>
        <div class="card-meta">${p.total_pts || 0} очков · ${p.tournaments || 0} турниров</div>
        <button class="btn btn-muted"  onclick="editPlayer('${esc(p.id)}', '${esc(p.name)}', '${esc(p.gender)}')">✎</button>
        <button class="btn btn-danger" onclick="banPlayer('${esc(p.id)}', '${esc(p.name)}', '${esc(p.status)}')">
          ${p.status === 'banned' ? '✓ Разбан' : '⊘ Бан'}
        </button>
      </div>
    `).join('') + '</div>';
  }

  window.editPlayer = async function(id, name, gender) {
    const newName = prompt('Изменить имя:', name);
    if (!newName || newName.trim() === name) return;
    try {
      await apiFetch(`/players?id=eq.${id}`, {
        method: 'PATCH',
        body: JSON.stringify({ name: newName.trim() })
      });
      loadPlayers();
    } catch (e) { alert('Ошибка: ' + e.message); }
  };

  window.banPlayer = async function(id, name, status) {
    const newStatus = status === 'banned' ? 'active' : 'banned';
    const msg = newStatus === 'banned'
      ? `Заблокировать игрока "${name}"?`
      : `Разблокировать игрока "${name}"?`;
    if (!confirm(msg)) return;
    try {
      await apiFetch(`/players?id=eq.${id}`, {
        method: 'PATCH',
        body: JSON.stringify({ status: newStatus })
      });
      loadPlayers();
    } catch (e) { alert('Ошибка: ' + e.message); }
  };

  document.getElementById('players-search').addEventListener('input', renderPlayers);
  document.getElementById('players-gender').addEventListener('change', renderPlayers);
  document.getElementById('players-status').addEventListener('change', loadPlayers);

  // ════════════════════════════════════════════════════════════
  //  TOURNAMENTS TAB
  // ════════════════════════════════════════════════════════════
  const FORMAT_NAMES = {
    kotc: 'King of the Court',
    ipt_mixed: 'IPT Mixed',
    classic: 'Классика',
    swiss: 'Швейцарская',
    double_elim: 'Double Elimination'
  };
  const STATUS_LABELS = {
    open: '🟢 Открыт', full: '🟡 Заполнен',
    in_progress: '🔵 Идёт', finished: '✅ Завершён', cancelled: '🔴 Отменён'
  };

  async function loadTournaments() {
    const el = document.getElementById('tournaments-list');
    el.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
    try {
      const data = await apiFetch('/tournaments?order=date.desc&select=id,name,date,format,format_code,status,max_players,capacity') || [];
      if (!data.length) {
        el.innerHTML = '<div class="empty-state">Нет турниров</div>';
        return;
      }
      el.innerHTML = data.map(t => {
        const fmt  = FORMAT_NAMES[t.format_code] || t.format || '—';
        const stat = STATUS_LABELS[t.status] || t.status || '—';
        const date = t.date ? new Date(t.date).toLocaleDateString('ru') : '—';
        return `
          <div class="trn-card">
            <div class="trn-info">
              <div class="trn-name">${esc(t.name)}</div>
              <div class="trn-meta">${esc(fmt)} · ${date} · ${stat}</div>
              ${t.max_players ? `<div class="trn-meta">Лимит: ${t.max_players} игроков</div>` : ''}
            </div>
            <div style="display:flex; gap:6px; flex-wrap:wrap; align-items:flex-start;">
              <select class="filter-select" onchange="changeTrnStatus('${esc(t.id)}', this.value)">
                <option ${t.status==='open'?'selected':''} value="open">Открыт</option>
                <option ${t.status==='full'?'selected':''} value="full">Заполнен</option>
                <option ${t.status==='in_progress'?'selected':''} value="in_progress">Идёт</option>
                <option ${t.status==='finished'?'selected':''} value="finished">Завершён</option>
                <option ${t.status==='cancelled'?'selected':''} value="cancelled">Отменён</option>
              </select>
            </div>
          </div>
        `;
      }).join('');
    } catch (e) {
      el.innerHTML = '<div class="empty-state" style="color:var(--danger)">Ошибка: ' + esc(e.message) + '</div>';
    }
  }

  window.changeTrnStatus = async function(id, status) {
    try {
      await apiFetch(`/tournaments?id=eq.${id}`, {
        method: 'PATCH',
        body: JSON.stringify({ status })
      });
    } catch (e) { alert('Ошибка: ' + e.message); loadTournaments(); }
  };

  document.getElementById('btn-create-trn').addEventListener('click', async () => {
    const name    = document.getElementById('trn-name').value.trim();
    const date    = document.getElementById('trn-date').value;
    const format  = document.getElementById('trn-format').value;
    const maxP    = parseInt(document.getElementById('trn-max').value) || null;
    const msgEl   = document.getElementById('trn-msg');

    if (!name) { msgEl.textContent = 'Введите название турнира'; msgEl.className = 'msg error'; return; }

    const btn = document.getElementById('btn-create-trn');
    btn.disabled = true;
    msgEl.className = 'msg';

    try {
      await apiFetch('/tournaments', {
        method: 'POST',
        headers: { ...authHeaders(), 'Prefer': 'return=minimal' },
        body: JSON.stringify({
          name,
          date: date || null,
          format: FORMAT_NAMES[format] || format,
          format_code: format,
          status: 'open',
          max_players: maxP,
          capacity: maxP
        })
      });
      msgEl.textContent = '✓ Турнир создан';
      msgEl.className = 'msg success';
      document.getElementById('trn-name').value = '';
      document.getElementById('trn-date').value = '';
      loadTournaments();
    } catch (e) {
      msgEl.textContent = 'Ошибка: ' + e.message;
      msgEl.className = 'msg error';
    }
    btn.disabled = false;
  });

  // ════════════════════════════════════════════════════════════
  //  HISTORY TAB
  // ════════════════════════════════════════════════════════════
  let allHistory = [];

  async function loadHistory() {
    const el = document.getElementById('history-list');
    el.innerHTML = '<div class="empty-state"><span class="spinner"></span></div>';
    try {
      allHistory = await apiFetch(
        '/rating_history?order=created_at.desc&limit=200&select=id,points_changed,new_total_rating,place,created_at,format_code,player_id,players(name),tournaments(name)'
      ) || [];
      renderHistory();
    } catch (e) {
      el.innerHTML = '<div class="empty-state" style="color:var(--danger)">Ошибка: ' + esc(e.message) + '</div>';
    }
  }

  function renderHistory() {
    const el     = document.getElementById('history-list');
    const search = document.getElementById('history-search').value.toLowerCase();

    const list = allHistory.filter(h => {
      const pname = h.players?.name || '';
      return !search || pname.toLowerCase().includes(search);
    });

    if (!list.length) {
      el.innerHTML = '<div class="empty-state">История пуста</div>';
      return;
    }

    el.innerHTML = '<div class="card">' + list.map(h => {
      const date  = h.created_at ? new Date(h.created_at).toLocaleDateString('ru') : '—';
      const pname = h.players?.name || '—';
      const tname = h.tournaments?.name || '—';
      const delta = h.points_changed >= 0 ? '+' + h.points_changed : h.points_changed;
      const dColor = h.points_changed >= 0 ? 'var(--success)' : 'var(--danger)';
      return `
        <div class="card-row">
          <div style="flex:1; min-width:120px;">
            <div class="card-name">${esc(pname)}</div>
            <div class="card-meta">${esc(tname)}</div>
          </div>
          <div style="font-weight:700; color:${dColor}">${delta} очков</div>
          ${h.new_total_rating != null ? `<div class="card-meta">Итого: ${h.new_total_rating}</div>` : ''}
          ${h.place ? `<div class="card-meta">#${h.place} место</div>` : ''}
          <div class="card-meta">${date}</div>
        </div>
      `;
    }).join('') + '</div>';
  }

  document.getElementById('history-search').addEventListener('input', renderHistory);
  document.getElementById('btn-refresh-history').addEventListener('click', loadHistory);

  // ── Init ──────────────────────────────────────────────────
  if (getToken()) {
    showAdminPanel();
  }
})();
</script>
</body>
</html>
