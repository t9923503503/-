# Эталонные фрагменты nginx для lpvolley.ru (Next.js + судейский SPA под /kotc/).
#
# На проде при overlay-деплое в корень `/var/www/ipt/` URI вида `/kotc/assets/*` мапятся
# на `/var/www/ipt/assets/*` (не на `web/public/kotc/...`). Актуальный снимок конфига:
# `.deploy/lpvolley.nginx.sites-enabled` (после правки 2026-04-03 — ^~ для kotc static).
#
# Проблема: если для всего /kotc/ стоит try_files ... /kotc/index.html, то запрос к
# несуществующему или «не тому» assets/*.css отдаёт HTML. Браузер с nosniff не
# применяет это как CSS → «сайт без стилей» (Chrome, Safari, iPad).
#
# Решение: жёсткий try_files $uri =404 для каталогов со статикой ДО общего /kotc/.
#
# Подставьте свои пути: APP_ROOT, порт Node, путь к standalone (см. web/.next/standalone/web).

# map $sent_http_content_type $frame_opt {
#   default "SAMEORIGIN";
# }

# server {
#   listen 443 ssl http2;
#   server_name lpvolley.ru;

    # --- 1) Судейский SPA: только реальные файлы (иначе 404, НЕ index.html) ---
    # root склеивает: URI /kotc/assets/app.css → файл ${ROOT}/kotc/assets/app.css
    location ^~ /kotc/assets/ {
        root /var/www/ipt/web/public;
        try_files $uri =404;
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    location ^~ /kotc/formats/ {
        root /var/www/ipt/web/public;
        try_files $uri =404;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ^~ /kotc/shared/ {
        root /var/www/ipt/web/public;
        try_files $uri =404;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location ^~ /kotc/locales/ {
        root /var/www/ipt/web/public;
        try_files $uri =404;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # --- 2) Остальное под /kotc/: index.html, sw.js, config.js, manifest и т.д. ---
    location /kotc/ {
        root /var/www/ipt/web/public;
        index index.html;
        try_files $uri $uri/ /kotc/index.html;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # --- 3) Next.js хэшированная статика (после postbuild standalone) ---
    # Путь должен указывать на каталог .next/static внутри standalone web.
    location /_next/static/ {
        alias /var/www/ipt/web/.next/standalone/web/.next/static/;
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # --- 4) Остальное из web/public (иконки, /images, и т.п.) ---
    location /images/ {
        root /var/www/ipt/web/public;
        try_files $uri =404;
    }

    # --- 5) Приложение Next.js ---
    location / {
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
# }
